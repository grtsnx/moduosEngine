name: Setup project
description: >-
  Install Bun, restore the dependency cache, and install dependencies with a
  frozen lockfile. Requires the repository to already be checked out.

runs:
  using: composite
  steps:
    - name: Install Bun
      uses: oven-sh/setup-bun@v2.2.0

    - name: Restore Bun cache
      uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: bun-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
